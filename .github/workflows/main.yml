name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  imageName: employee-app
  acrName: myacr.azurecr.io
  tag: ${{ github.run_number }}

jobs:
  build_and_analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ✅ Build + SonarCloud Scan (FIXED)
    - name: Build and SonarCloud Scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn clean verify sonar:sonar \
        -Dsonar.projectKey=Kuladeep-0809_employee-app \
        -Dsonar.organization=kuladeep-0809 \
        -Dsonar.host.url=https://sonarcloud.io

    # ✅ Quality Gate (optional but good)
    - name: SonarCloud Quality Gate
      uses: sonarsource/sonarqube-quality-gate-action@v1
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Login to ACR
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.acrName }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ env.acrName }}/${{ env.imageName }}:${{ env.tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_analyze
    environment: dev

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Set AKS context
      uses: azure/aks-set-context@v3
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        cluster-name: myaks
        resource-group: myrg

    - name: Deploy to AKS
      run: |
        kubectl apply -f k8s/deployment.yml -f k8s/service.yml -n dev
        kubectl set image deployment/employee-app employee-app=${{ env.acrName }}/${{ env.imageName }}:${{ env.tag }} -n dev
